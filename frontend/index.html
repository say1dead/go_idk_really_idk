<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Auth</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<h1>Auth</h1>

	<section>
		<h2>Регистрация</h2>

		<input id="register-login" placeholder="Логин">
		<input id="register-password" type="password" placeholder="Пароль">

		<button onclick="registerUser()">Зарегистрироваться</button>
	</section>

	<section>
		<h2>Вход</h2>

		<input id="login-login" placeholder="Логин">
		<input id="login-password" type="password" placeholder="Пароль">

		<button onclick="loginUser()">Войти</button>
	</section>

	<p id="message"></p>

	<script src="/script.js"></script>
</body>
</html>
